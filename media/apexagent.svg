<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Robot head -->
  <rect x="5" y="7" width="14" height="11" rx="3" stroke="currentColor" stroke-width="1.5"/>
  <!-- Antenna -->
  <line x1="12" y1="4" x2="12" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="12" cy="3" r="1.5" fill="currentColor"/>
  <!-- Eyes -->
  <circle cx="9" cy="12" r="1.5" fill="currentColor"/>
  <circle cx="15" cy="12" r="1.5" fill="currentColor"/>
  <!-- Mouth / chat bubble -->
  <rect x="8" y="15" width="8" height="1.5" rx="0.75" fill="currentColor"/>
  <!-- Ears -->
  <rect x="4" y="10" width="1" height="3" rx="0.5" fill="currentColor"/>
  <rect x="19" y="10" width="1" height="3" rx="0.5" fill="currentColor"/>
</svg>
